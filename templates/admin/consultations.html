{% extends "base.html" %}

{% block content %}
<h1>Заявки на подбор питомца</h1>
<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Животное</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for c in consultations %}
            <tr>
                <td>{{ c.id }}</td>
                <td>{{ c.created_at.strftime('%d.%m.%Y %H:%M') }}</td>
                <td>{{ c.name }}</td>
                <td>{{ c.phone }}</td>
                <td>{{ c.animal_type }}</td>
                <td>
                    <form method="POST" action="{{ url_for('update_consultation_status', id=c.id) }}" class="d-flex gap-2">
                        <select name="status" class="form-select form-select-sm">
                            <option value="Новая" {% if c.status == 'Новая' %}selected{% endif %}>Новая</option>
                            <option value="В работе" {% if c.status == 'В работе' %}selected{% endif %}>В работе</option>
                            <option value="Завершена" {% if c.status == 'Завершена' %}selected{% endif %}>Завершена</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-primary">Обновить</button>
                    </form>
                </td>
                <td>
                    <a href="{{ url_for('consultation_detail', id=c.id) }}" class="btn btn-sm btn-info">Детали</a>
                    <a href="{{ url_for('delete_consultation', id=c.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить заявку?')">Удалить</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
