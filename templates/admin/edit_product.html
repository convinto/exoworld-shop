{% extends "base.html" %}
{% block content %}
<h1>{% if product %}Редактировать товар{% else %}Добавить товар{% endif %}</h1>
<form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label>Название</label>
        <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
    </div>
    <div class="mb-3">
        <label>Описание</label>
        <textarea name="description" class="form-control" rows="4" required>{{ product.description if product else '' }}</textarea>
    </div>
    <div class="mb-3">
        <label>Цена</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price if product else '' }}" required>
    </div>
    <div class="mb-3">
        <label>Количество на складе</label>
        <input type="number" name="stock" class="form-control" value="{{ product.stock if product else '0' }}" required>
    </div>
    <div class="mb-3">
        <label>Категория</label>
        <select name="category" class="form-select" required>
            <option value="животные" {% if product and product.category == 'животные' %}selected{% endif %}>Животные</option>
            <option value="корм" {% if product and product.category == 'корм' %}selected{% endif %}>Корм</option>
            <option value="декорации" {% if product and product.category == 'декорации' %}selected{% endif %}>Декорации</option>
            <option value="террариумы" {% if product and product.category == 'террариумы' %}selected{% endif %}>Террариумы</option>
        </select>
    </div>
    <div class="mb-3">
        <label>Изображение товара</label>
        <input type="file" name="image" class="form-control" accept="image/*">
        {% if product and product.image %}
            <div class="mt-2">
                <img src="{{ url_for('static', filename='uploads/' + product.image) }}" style="max-height: 100px;">
                <p class="small">Текущее изображение. Загрузите новое, чтобы заменить.</p>
            </div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('admin_panel') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
